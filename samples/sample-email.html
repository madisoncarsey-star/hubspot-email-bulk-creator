<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Sample Marketing Email</title>
  </head>
  <body>
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#f7f3ec;padding:24px 0;">
      <tr>
        <td align="center">
          <table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0" style="background:#ffffff;border-radius:16px;overflow:hidden;">
            <tr>
              <td style="padding:40px 40px 16px;font-family:Arial,sans-serif;color:#1d1b17;">
                <p style="margin:0 0 12px;font-size:13px;letter-spacing:1px;text-transform:uppercase;color:#b04d2f;">Spring launch</p>
                <h1 style="margin:0 0 16px;font-size:34px;line-height:1.1;">A cleaner way to manage campaign handoff</h1>
                <p style="margin:0 0 24px;font-size:16px;line-height:1.6;color:#5d574d;">
                  Give your team one place to review copy, assets, and timing before the send goes live.
                </p>
                <a href="https://example.com" style="display:inline-block;padding:14px 20px;background:#1d1b17;color:#ffffff;text-decoration:none;border-radius:999px;">Explore the launch</a>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
